name: Build & Test

# yamllint disable-line rule:truthy
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  BUILD_TYPE: Debug

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python_unit_tests:
    name: Python unit tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python requirements
        run: pip install -r requirements/dev.txt

      - name: Install LRPC Python package
        run: pip install .

      - name: Python unit tests
        run: pytest -v

  cpp_unit_tests:
    name: C++ unit tests (${{ matrix.config.c_compiler }}, C++${{ matrix.cxx_standard }})
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, c_compiler: gcc, cpp_compiler: g++}
          - {os: ubuntu-latest, c_compiler: clang, cpp_compiler: clang++}
          - {os: windows-latest, c_compiler: cl, cpp_compiler: cl}
        # Test all standards on main. Otherwise only the oldest and newest versions
        # will give very low likelihood of any issue with versions in between
        cxx_standard: >-
          ${{ github.ref == 'refs/heads/main' && fromJSON('[11, 14, 17, 20, 23]') || fromJSON('[11, 23]') }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install LRPC Python package
        run: pip install .

      - name: Set up MSVC developer environment
        if: matrix.config.c_compiler == 'cl'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

      - name: Configure unit tests
        shell: bash
        env:
          CXX_STANDARD: ${{ matrix.cxx_standard }}
          C_COMPILER: ${{ matrix.config.c_compiler }}
          CXX_COMPILER: ${{ matrix.config.cpp_compiler }}
        run: |
          cmake -B cmake_build \
          -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
          -DCMAKE_C_COMPILER="$C_COMPILER" \
          -DCMAKE_CXX_COMPILER="$CXX_COMPILER" \
          -DCMAKE_CXX_STANDARD="$CXX_STANDARD" \
          -G Ninja

      - name: Build unit tests
        shell: bash
        run: cmake --build cmake_build --config "$BUILD_TYPE" --parallel

      - name: C++ unit tests
        shell: bash
        working-directory: cmake_build
        run: ctest -C "$BUILD_TYPE" --output-on-failure

  quality_analysis:
    name: Quality analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BUILD_WRAPPER_OUT_DIR: bw_out

    permissions:
      contents: read
      checks: write # for EnricoMi/publish-unit-test-result-action
      pull-requests: write # for EnricoMi/publish-unit-test-result-action

    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: SonarQube Install
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@713881670b6b3676cda39549040e2d88c70d582e

      - name: Install LLVM 19
        run: sudo apt-get install -y clang-19 clang-tidy-19 llvm-19-dev libclang-19-dev

      - name: Get IWYU cache key
        id: iwyu-key
        run: |
          url="https://github.com/include-what-you-use/include-what-you-use.git"
          echo "sha=$(git ls-remote "$url" clang_19 | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache IWYU
        id: cache-iwyu
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ${{ github.workspace }}/iwyu-install
          key: iwyu-clang19-${{ runner.os }}-${{ steps.iwyu-key.outputs.sha }}

      - name: Build IWYU
        if: steps.cache-iwyu.outputs.cache-hit != 'true'
        env:
          IWYU_INSTALL: ${{ github.workspace }}/iwyu-install
        run: |
          git clone https://github.com/include-what-you-use/include-what-you-use.git \
            --branch clang_19 --depth 1
          cmake -S include-what-you-use -B iwyu_build \
            -DCMAKE_PREFIX_PATH=/usr/lib/llvm-19 \
            -DCMAKE_INSTALL_PREFIX="$IWYU_INSTALL" \
            -G Ninja
          cmake --build iwyu_build --target install

      - name: Add IWYU to PATH
        env:
          IWYU_INSTALL: ${{ github.workspace }}/iwyu-install
        run: echo "$IWYU_INSTALL/bin" >> "$GITHUB_PATH"

      - name: Install Python requirements
        run: pip install -r requirements/dev.txt

      - name: Install LRPC Python package
        # -e to make sure all analysis is done on source files and not on files in site-packages
        run: pip install -e .

      - name: Install ARM GCC
        working-directory: scripts
        run: python install_arm_gcc.py --destination "$RUNNER_TEMP/lrpc-tools/arm-gcc"

      - name: Build examples
        run: |
          set -e
          cmake \
          -DTOOLCHAIN_PATH="$RUNNER_TEMP/lrpc-tools/arm-gcc/bin/" \
          -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
          -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/examples/stm32_nucleo_l496/cmake/gcc-arm-none-eabi.cmake" \
          -S "$GITHUB_WORKSPACE/examples/stm32_nucleo_l496" \
          -B "$GITHUB_WORKSPACE/examples/stm32_nucleo_l496/build/Release" \
          -G Ninja
          cmake \
          --build "$GITHUB_WORKSPACE/examples/stm32_nucleo_l496/build/Release" \
          --parallel 10

      - name: Configure unit tests
        run: >
          cmake -B "$GITHUB_WORKSPACE/cmake_build"
          -DCMAKE_BUILD_TYPE="$BUILD_TYPE"
          -DCMAKE_C_COMPILER=clang-19
          -DCMAKE_CXX_COMPILER=clang++-19
          -DCMAKE_CXX_STANDARD=11
          -DENABLE_CLANG_TIDY=ON
          -G Ninja

      - name: Build unit tests with SQ and Clang-tidy
        run: >
          build-wrapper-linux-x86-64 --out-dir "$BUILD_WRAPPER_OUT_DIR" cmake --build
          "$GITHUB_WORKSPACE/cmake_build" --config "$BUILD_TYPE" --parallel

      - name: Run IWYU
        run: |
          set -euo pipefail
          iwyu_tool.py -p cmake_build "$GITHUB_WORKSPACE/tests/cpp" 2>&1 | tee iwyu_output.txt
          if grep -qE "should (add|remove)" iwyu_output.txt; then
            echo "IWYU found include issues (see above)"
            exit 1
          fi

      - name: Run C++ unit tests
        working-directory: ${{github.workspace}}/cmake_build
        run: >
          ctest -C "$BUILD_TYPE" --output-junit ../testresults/cpptestresults.xml --output-on-failure

      - name: Python unit tests
        run: pytest -v --junitxml=testresults/pytestresults.xml

      - name: Code coverage on tools
        env:
          COVERAGE_RCFILE: ${{github.workspace}}/pyproject.toml
        working-directory: src
        run: |
          set -ex
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer1.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer2.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer3.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer4.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer5.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestBytearray.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w \
            -d ../tests/testdata/TestRetrieveDefinition.lrpc.yaml -o cov_out

      - name: Code coverage on unit tests
        run: |
          set -ex
          coverage run -a -m pytest
          coverage combine -a src/.coverage
          coverage xml

      - name: Publish Test Results
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: EnricoMi/publish-unit-test-result-action/linux@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        with:
          files: "testresults/*.xml"

      - name: SonarQube Scan
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}
        with:
          args: --define "sonar.cfamily.compile-commands=${{github.workspace}}/cmake_build/compile_commands.json"

      - name: Draft release notes
        run: towncrier build --draft
