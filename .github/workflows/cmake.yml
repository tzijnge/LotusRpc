name: CMake

# yamllint disable-line rule:truthy
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

env:
  BUILD_TYPE: Debug

jobs:
  python_unit_tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python requirements
        run: pip install -r requirements/dev.txt

      - name: Install LRPC Python package
        run: pip install .

      - name: Python unit tests
        run: pytest -v

  cpp_unit_tests:
    runs-on: ${{ matrix.config.os }}
    env:
      CXX_STANDARDS: "11 14 17 20 23 26"
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, c_compiler: gcc, cpp_compiler: g++}
          - {os: ubuntu-latest, c_compiler: clang, cpp_compiler: clang++}
          - {os: windows-latest, c_compiler: cl, cpp_compiler: cl}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install LRPC Python package
        run: pip install .

      - name: Set up MSVC developer environment
        if: matrix.config.c_compiler == 'cl'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 #v1.13.0

      - name: Configure, build and test all C++ standards
        shell: bash
        run: |
          for std in ${{ env.CXX_STANDARDS }}; do
            echo "::group::C++$std"
            echo "=============================="
            echo " Building and testing C++$std"
            echo "=============================="
            cmake -B cmake_build_$std \
            -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
            -DCMAKE_C_COMPILER=${{ matrix.config.c_compiler }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.config.cpp_compiler }} \
            -DCMAKE_CXX_STANDARD=$std \
            -G Ninja
            cmake --build cmake_build_$std --config ${{env.BUILD_TYPE}} --parallel 4
            ctest --test-dir cmake_build_$std -C ${{env.BUILD_TYPE}} --output-on-failure
            echo "::endgroup::"
          done

  quality_analysis:
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: bw_out

    permissions:
      checks: write
      pull-requests: write

    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: SonarQube Install
        uses: SonarSource/sonarqube-scan-action/install-build-wrapper@299e4b793aaa83bf2aba7c9c14bedbb485688ec4

      - name: Install Python requirements
        run: pip install -r requirements/dev.txt

      - name: Install LRPC Python package
        run: pip install .

      - name: Install ARM GCC
        working-directory: scripts
        run: python install_arm_gcc.py --destination ${{runner.temp}}/lrpc-tools/arm-gcc

      - name: Build examples
        run: |
          set -e
          cmake \
          -DTOOLCHAIN_PATH=${{runner.temp}}/lrpc-tools/arm-gcc/bin/ \
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} \
          -DCMAKE_TOOLCHAIN_FILE=${{github.workspace}}/examples/stm32_nucleo_l496/cmake/gcc-arm-none-eabi.cmake \
          -S ${{github.workspace}}/examples/stm32_nucleo_l496 \
          -B ${{github.workspace}}/examples/stm32_nucleo_l496/build/Release \
          -G Ninja
          cmake \
          --build ${{github.workspace}}/examples/stm32_nucleo_l496/build/Release \
          --parallel 10

      - name: Configure unit tests
        run: cmake -B ${{github.workspace}}/cmake_build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build unit tests with SQ
        run: >
          build-wrapper-linux-x86-64 --out-dir ${{ env.BUILD_WRAPPER_OUT_DIR }} cmake --build
          ${{github.workspace}}/cmake_build --config ${{env.BUILD_TYPE}}

      - name: C++ unit tests
        working-directory: ${{github.workspace}}/cmake_build
        run: >
          ctest -C ${{env.BUILD_TYPE}} --output-junit ../testresults/cpptestresults.xml --output-on-failure

      - name: Python unit tests
        run: pytest -v --junitxml=testresults/pytestresults.xml

      - name: Code coverage on tools
        env:
          COVERAGE_RCFILE: ${{github.workspace}}/pyproject.toml
        working-directory: src
        run: |
          set -ex
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer1.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer2.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer3.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer4.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestServer5.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w -d ../tests/testdata/TestBytearray.lrpc.yaml -o cov_out
          coverage run -a -m lrpc.tools.lrpcg.lrpcg cpp -w \
            -d ../tests/testdata/TestRetrieveDefinition.lrpc.yaml -o cov_out

      - name: Code coverage on unit tests
        run: |
          set -ex
          coverage run -a -m pytest
          coverage combine -a src/.coverage
          coverage xml

      - name: Publish Test Results
        if: ${{ github.triggering_actor != 'dependabot[bot]' }}
        uses: EnricoMi/publish-unit-test-result-action/linux@v2
        with:
          files: "testresults/*.xml"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_ROOT_CERT: ${{ secrets.SONAR_ROOT_CERT }}
        with:
          args: --define "sonar.cfamily.compile-commands=${{ env.BUILD_WRAPPER_OUT_DIR }}/compile_commands.json"

      - name: Draft release notes
        run: towncrier build --draft
